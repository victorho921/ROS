force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: force_torque_sensor
    frame_id: fr3_link7
    topic_name: /force_torque
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z



