# List of controller 
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # robot_controller:
    #   type: gazebo_practise/CustomRobotController 
      # gazebo_practise - package name where the plugin is defined
      # CustomRobotController - self defined C++ class name inside the controller program

    # franka_arm_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController


    # franka_hand_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController
    
    force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    

# Controller parameter
# Custom controller
robot_controller:
  ros__parameters:
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7

    command_interfaces:
      - effort

    state_interfaces:
      - position
      - velocity


joint_trajectory_controller:
  ros__parameters:
    gazebo: true
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7
  
    command_interfaces:
      - position 
      - velocity
    state_interfaces:
      - position
      - velocity

